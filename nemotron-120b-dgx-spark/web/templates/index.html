<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemotron Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }
        
        .header h1 {
            font-size: 1.4em;
            color: #e94560;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-label {
            color: #888;
        }
        
        .stat-value {
            font-weight: bold;
            color: #4ecca3;
        }
        
        .stat-bar {
            width: 80px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .stat-bar-fill {
            height: 100%;
            background: #4ecca3;
            transition: width 0.3s;
        }
        
        .stat-bar-fill.high {
            background: #e94560;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #0f0f1a;
            border-radius: 10px;
            margin-bottom: 15px;
            min-height: 400px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 10px;
            max-width: 85%;
        }
        
        .message.user {
            background: #16213e;
            margin-left: auto;
            text-align: right;
        }
        
        .message.assistant {
            background: #1f4068;
        }
        
        .message .role {
            font-size: 0.75em;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .message .content {
            white-space: pre-wrap;
            line-height: 1.5;
        }
        
        .message .reasoning {
            font-size: 0.85em;
            color: #888;
            font-style: italic;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #444;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        .input-area textarea {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: #16213e;
            color: #eee;
            font-size: 1em;
            resize: none;
            min-height: 50px;
            max-height: 150px;
        }
        
        .input-area textarea:focus {
            outline: 2px solid #4ecca3;
        }
        
        .input-area button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #e94560;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .input-area button:hover {
            background: #c73e54;
        }
        
        .input-area button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        
        .loading {
            display: none;
            color: #888;
            font-style: italic;
            padding: 10px;
        }
        
        .error {
            color: #e94560;
            padding: 10px;
            background: #2a1a1a;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .model-info {
            font-size: 0.8em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Nemotron Chat</h1>
        <div class="stats">
            <div class="stat">
                <span class="stat-label">CPU:</span>
                <div class="stat-bar"><div class="stat-bar-fill" id="cpu-bar"></div></div>
                <span class="stat-value" id="cpu-value">--%</span>
            </div>
            <div class="stat">
                <span class="stat-label">RAM:</span>
                <div class="stat-bar"><div class="stat-bar-fill" id="ram-bar"></div></div>
                <span class="stat-value" id="ram-value">--%</span>
            </div>
            <div class="stat">
                <span class="stat-label">GPU:</span>
                <span class="stat-value" id="gpu-value">-- MiB</span>
            </div>
        </div>
    </div>
    
    <div class="chat-container">
        <div class="model-info" id="model-info">Loading model info...</div>
        <div class="messages" id="messages">
            <div class="message assistant">
                <div class="role">Assistant</div>
                <div class="content">Hello! I'm Nemotron-3-Super-120B. How can I help you today?</div>
            </div>
        </div>
        <div class="loading" id="loading">Thinking...</div>
        <div class="error" id="error" style="display:none;"></div>
        <div class="input-area">
            <textarea id="user-input" placeholder="Type your message..." rows="1"></textarea>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
    
    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const modelInfo = document.getElementById('model-info');
        
        let conversationHistory = [];
        
        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
        
        // Enter to send (Shift+Enter for newline)
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Fetch model info
        async function fetchModelInfo() {
            try {
                const response = await fetch('/api/models');
                const data = await response.json();
                if (data.data && data.data[0]) {
                    const model = data.data[0];
                    const meta = model.meta || {};
                    modelInfo.textContent = `Model: ${model.id} | Context: ${meta.n_ctx_train?.toLocaleString()} tokens | Params: ${(meta.n_params / 1e9).toFixed(1)}B`;
                }
            } catch (e) {
                modelInfo.textContent = 'Model: Nemotron-3-Super-120B (local)';
            }
        }
        
        // Update stats
        async function updateStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                // CPU
                const cpuValue = data.cpu_percent;
                document.getElementById('cpu-value').textContent = cpuValue + '%';
                const cpuBar = document.getElementById('cpu-bar');
                cpuBar.style.width = cpuValue + '%';
                cpuBar.className = 'stat-bar-fill' + (cpuValue > 80 ? ' high' : '');
                
                // RAM
                const ramValue = data.memory_percent;
                document.getElementById('ram-value').textContent = ramValue + '%';
                const ramBar = document.getElementById('ram-bar');
                ramBar.style.width = ramValue + '%';
                ramBar.className = 'stat-bar-fill' + (ramValue > 80 ? ' high' : '');
                ramBar.title = `${data.memory_used_gb} / ${data.memory_total_gb} GB`;
                
                // GPU
                document.getElementById('gpu-value').textContent = 
                    data.gpu_memory_used_mb !== 'N/A' 
                        ? `${data.gpu_memory_used_mb} / ${data.gpu_memory_total_mb} MiB`
                        : 'N/A';
            } catch (e) {
                console.error('Failed to fetch stats:', e);
            }
        }
        
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            // Clear input
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // Add user message
            addMessage('user', message);
            conversationHistory.push({ role: 'user', content: message });
            
            // Show loading
            loadingDiv.style.display = 'block';
            sendBtn.disabled = true;
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'nemotron',
                        messages: conversationHistory,
                        max_tokens: 2048,
                        stream: false
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                const assistantMessage = data.choices[0].message;
                conversationHistory.push(assistantMessage);
                
                // Display the response
                addMessage('assistant', assistantMessage.content || '', assistantMessage.reasoning_content);
                
            } catch (e) {
                errorDiv.textContent = 'Error: ' + e.message;
                errorDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
                sendBtn.disabled = false;
                userInput.focus();
            }
        }
        
        function addMessage(role, content, reasoning = null) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            
            const roleDiv = document.createElement('div');
            roleDiv.className = 'role';
            roleDiv.textContent = role === 'user' ? 'You' : 'Assistant';
            div.appendChild(roleDiv);
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            contentDiv.textContent = content;
            div.appendChild(contentDiv);
            
            if (reasoning) {
                const reasoningDiv = document.createElement('div');
                reasoningDiv.className = 'reasoning';
                reasoningDiv.textContent = '💭 ' + reasoning;
                div.appendChild(reasoningDiv);
            }
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Initialize
        fetchModelInfo();
        updateStats();
        setInterval(updateStats, 2000);  // Update stats every 2 seconds
        userInput.focus();
    </script>
</body>
</html>
